name: Daily Nurexone Stock Monitor

on:
  schedule:
    # Runs every day at 15:00 UTC
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  monitor_stock:
    runs-on: ubuntu-latest

    # Opt-in to Node.js 24 now (avoids future breakage)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'   # speeds up installs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create .env file
      run: |
        cat <<EOF > .env
        EMAIL_USER=${{ secrets.EMAIL_USER }}
        EMAIL_PASSWORD=${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECIPIENT=${{ secrets.EMAIL_RECIPIENT }}
        EOF

    - name: Debug - list files
      run: ls -R

    - name: Run stock monitor script
      run: python NRX_Stock_Report.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stock-reports-${{ github.run_id }}
        path: "*.png"
